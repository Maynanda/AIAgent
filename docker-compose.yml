version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hermes_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hermes_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hermes_pgdata:
    driver: local
