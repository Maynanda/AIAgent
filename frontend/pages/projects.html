<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — ARIA / Hermes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .page-layout {
      display: grid;
      grid-template-columns: 270px 1fr;
      gap: 20px;
      height: calc(100vh - 120px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-title { font-size: 13px; font-weight: 600; color: #a0a0b0; text-transform: uppercase; letter-spacing: .06em; }
    .btn-new-project {
      padding: 6px 12px; font-size: 12px; font-weight: 600;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; border-radius: 8px; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-new-project:hover { opacity: .85; }
    .project-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .project-item {
      padding: 12px 14px; border-radius: 10px; cursor: pointer;
      border: 1px solid transparent; transition: all .18s;
      background: rgba(255,255,255,0.02);
    }
    .project-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); }
    .project-item.active { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.4); }
    .project-item-name { font-size: 13px; font-weight: 600; color: #e2e2f0; margin-bottom: 5px; }
    .project-item-meta { display: flex; justify-content: space-between; align-items: center; }
    .project-item-pct { font-size: 11px; color: #7c3aed; font-weight: 600; }
    .project-item-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    .status-active { background: rgba(34,197,94,.15); color: #4ade80; }
    .status-paused { background: rgba(234,179,8,.12); color: #facc15; }
    .status-completed { background: rgba(99,102,241,.12); color: #818cf8; }
    .mini-progress { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 6px; }
    .mini-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #7c3aed, #4f46e5); transition: width .4s; }

    /* ── Main Detail Panel ── */
    .detail-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #555; text-align: center; gap: 12px;
    }
    .empty-state-icon { font-size: 48px; }
    .empty-state-text { font-size: 14px; color: #666; }

    /* ── Project Header ── */
    .project-header {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 24px;
    }
    .project-title-row {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px;
    }
    .project-title { font-size: 22px; font-weight: 700; color: #e8e8f8; }
    .project-description { font-size: 13px; color: #888; line-height: 1.5; }
    .project-meta-row {
      display: flex; align-items: center; gap: 16px; margin-top: 10px; flex-wrap: wrap;
    }
    .meta-chip {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500;
      background: rgba(255,255,255,0.07); color: #999; border: 1px solid rgba(255,255,255,0.1);
    }
    .meta-chip.deadline { color: #f87171; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
    .meta-chip.ontrack { color: #4ade80; border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-action {
      padding: 7px 14px; font-size: 12px; font-weight: 600; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
      color: #ccc; cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-action:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-action.primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-color: transparent; color: #fff;
    }
    .btn-action.primary:hover { opacity: .88; }

    /* ── 4 Leader Blocks ── */
    .leader-blocks-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 1100px) { .leader-blocks-grid { grid-template-columns: repeat(2, 1fr); } }

    .leader-block {
      border-radius: 14px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      transition: border-color .2s;
    }
    .leader-block:hover { border-color: rgba(255,255,255,0.14); }
    .lb-progress { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.25); }
    .lb-focus    { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }
    .lb-blockers { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
    .lb-support  { background: rgba(251,146,60,0.08); border-color: rgba(251,146,60,0.2); }

    .lb-icon { font-size: 22px; margin-bottom: 8px; }
    .lb-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .lb-progress .lb-label { color: #818cf8; }
    .lb-focus    .lb-label { color: #34d399; }
    .lb-blockers .lb-label { color: #f87171; }
    .lb-support  .lb-label { color: #fb923c; }

    .lb-kpi { font-size: 28px; font-weight: 700; color: #e8e8f8; line-height: 1; margin-bottom: 4px; }
    .lb-kpi-sub { font-size: 11px; color: #666; margin-bottom: 10px; }
    .lb-text { font-size: 12px; color: #aaa; line-height: 1.5; }

    /* Progress ring */
    .progress-ring-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
    .progress-ring-fill { fill: none; stroke: #7c3aed; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }

    /* Item pills */
    .lb-items { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .lb-item-pill {
      font-size: 11px; color: #ccc; background: rgba(255,255,255,0.05);
      border-radius: 6px; padding: 4px 8px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; border: 1px solid rgba(255,255,255,0.07);
    }
    .lb-item-pill.blocked { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #fca5a5; }

    /* ── AI Insights Panel ── */
    .section-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .section-title { font-size: 13px; font-weight: 700; color: #c0c0d8; display: flex; align-items: center; gap: 7px; }
    .section-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
      background: rgba(124,58,237,.25); color: #a78bfa;
    }

    /* Insights list */
    .insight-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02); margin-bottom: 8px;
      transition: border-color .18s;
    }
    .insight-item:hover { border-color: rgba(255,255,255,0.12); }
    .insight-type-badge {
      font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
    }
    .type-auto_task { background: rgba(99,102,241,.2); color: #818cf8; }
    .type-risk { background: rgba(239,68,68,.15); color: #f87171; }
    .type-blocker { background: rgba(239,68,68,.2); color: #fca5a5; }
    .type-update { background: rgba(16,185,129,.15); color: #34d399; }
    .type-milestone { background: rgba(251,146,60,.15); color: #fdba74; }
    .insight-body { flex: 1; }
    .insight-title { font-size: 13px; font-weight: 600; color: #ddd; margin-bottom: 3px; }
    .insight-meta { font-size: 11px; color: #666; }
    .insight-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-insight {
      padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;
      cursor: pointer; border: 1px solid; transition: all .15s;
    }
    .btn-accept { background: rgba(34,197,94,.12); color: #4ade80; border-color: rgba(34,197,94,.3); }
    .btn-accept:hover { background: rgba(34,197,94,.22); }
    .btn-reject { background: rgba(239,68,68,.08); color: #f87171; border-color: rgba(239,68,68,.25); }
    .btn-reject:hover { background: rgba(239,68,68,.16); }

    /* ── Draft Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #14141f; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 28px; width: 560px; max-width: 95vw; max-height: 85vh; overflow-y: auto;
      transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-size: 18px; font-weight: 700; color: #e8e8f8; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: #666; margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .06em; }
    .form-select, .form-input {
      padding: 9px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; color: #e2e2f0; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .18s;
    }
    .form-select:focus, .form-input:focus { border-color: rgba(124,58,237,.5); }
    .draft-output {
      margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      font-size: 13px; color: #ccc; line-height: 1.7; white-space: pre-wrap;
      min-height: 120px; display: none;
    }
    .draft-output.visible { display: block; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      padding: 9px 18px; font-size: 13px; font-weight: 600; border-radius: 9px;
      background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #888; cursor: pointer;
    }
    .btn-generate {
      padding: 9px 20px; font-size: 13px; font-weight: 600; border-radius: 9px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5); border: none; color: #fff; cursor: pointer;
    }
    .btn-copy {
      padding: 7px 14px; font-size: 12px; font-weight: 600; border-radius: 8px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: #ccc; cursor: pointer;
    }
    .btn-copy:hover { background: rgba(255,255,255,0.12); }

    /* ── Kanban quick view ── */
    .kanban-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .kanban-col { background: rgba(255,255,255,0.02); border-radius: 10px; padding: 12px; }
    .kanban-col-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      color: #666; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-count { background: rgba(255,255,255,0.07); border-radius: 8px; padding: 1px 6px; font-size: 10px; color: #888; }
    .kanban-task {
      font-size: 12px; color: #ccc; padding: 7px 9px; background: rgba(255,255,255,0.04);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); margin-bottom: 5px;
      cursor: pointer; transition: all .15s; line-height: 1.4;
    }
    .kanban-task:hover { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.3); transform: translateY(-1px); }
    .kanban-task.blocked-task { border-color: rgba(239,68,68,0.25); color: #fca5a5; }
    .kanban-task.done-task { opacity: .45; text-decoration: line-through; }

    /* ── Activity Feed ── */
    .activity-feed { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 12px; border-radius: 9px; background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06); font-size: 12px;
    }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dot-note    { background: #818cf8; }
    .dot-meeting { background: #34d399; }
    .dot-email   { background: #fb923c; }
    .dot-call    { background: #f472b6; }
    .dot-update  { background: #facc15; }
    .activity-text { flex: 1; color: #bbb; line-height: 1.5; }
    .activity-time { font-size: 10px; color: #555; flex-shrink: 0; }
    .log-activity-form { display: flex; gap: 8px; align-items: flex-end; }
    .log-input {
      flex: 1; padding: 9px 12px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 9px;
      color: #e2e2f0; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .18s; resize: none;
    }
    .log-input:focus { border-color: rgba(124,58,237,.5); }
    .log-type-select {
      padding: 9px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px; color: #aaa; font-size: 12px; font-family: inherit;
      outline: none; cursor: pointer; flex-shrink: 0;
    }
    .btn-log {
      padding: 9px 16px; font-size: 12px; font-weight: 600; border-radius: 9px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5); border: none; color: #fff;
      cursor: pointer; flex-shrink: 0; transition: opacity .18s;
    }
    .btn-log:hover { opacity: .88; }
    .btn-log:disabled { opacity: .45; }

    /* ── Task Detail Modal ── */
    .task-modal-status {
      display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0;
    }
    .status-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; transition: all .15s;
      background: rgba(255,255,255,0.05); color: #888; border-color: rgba(255,255,255,0.1);
    }
    .status-chip.active-status { color: #fff; }
    .status-chip[data-status="todo"].active-status { background: rgba(99,102,241,.3); border-color: #818cf8; color: #c7d2fe; }
    .status-chip[data-status="in_progress"].active-status { background: rgba(16,185,129,.25); border-color: #34d399; color: #6ee7b7; }
    .status-chip[data-status="blocked"].active-status { background: rgba(239,68,68,.2); border-color: #f87171; color: #fca5a5; }
    .status-chip[data-status="done"].active-status { background: rgba(124,58,237,.25); border-color: #a78bfa; color: #ddd6fe; }
    .btn-auto-update {
      padding: 7px 14px; font-size: 12px; font-weight: 600; border-radius: 8px;
      background: linear-gradient(135deg, #059669, #0d9488);
      border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: opacity .18s;
    }
    .btn-auto-update:hover:not(:disabled) { opacity: .88; }
    .btn-auto-update:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Loading spinner ── */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #7c3aed; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: #1e1e30; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px 20px; font-size: 13px; color: #e2e2f0; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4); transform: translateY(20px); opacity: 0;
      transition: all .3s; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,.3); }
    .toast.error { border-color: rgba(239,68,68,.3); }
  </style>
</head>
<body>
  <!-- Nav injected by main layout -->
  <script src="/assets/js/nav.js" defer></script>

  <div class="app-container">
    <div class="page-layout">

      <!-- ── Left Sidebar: Project List ── -->
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Projects</span>
          <button class="btn-new-project" onclick="openNewProjectModal()">+ New</button>
        </div>
        <div class="project-list" id="projectList">
          <div style="padding:20px;text-align:center;color:#555;font-size:13px;">Loading…</div>
        </div>
      </div>

      <!-- ── Right: Project Detail ── -->
      <div class="detail-panel" id="detailPanel">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div style="font-size:16px;font-weight:600;color:#444;">Select a project</div>
          <div class="empty-state-text">Pick a project from the sidebar to view its status and leader blocks.</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Draft Update Modal ── -->
  <div class="modal-overlay" id="draftModal">
    <div class="modal">
      <div class="modal-title">✍️ Generate Update Draft</div>
      <div class="modal-sub" id="draftModalSub">AI will write a project update based on current status and recent activities.</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Format</label>
          <select class="form-select" id="draftFormat">
            <option value="email">📧 Email</option>
            <option value="slack">💬 Slack message</option>
            <option value="bullet">📝 Bullet points</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tone</label>
          <select class="form-select" id="draftTone">
            <option value="professional">Professional</option>
            <option value="casual">Casual</option>
            <option value="executive">Executive brief</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Recipient (optional)</label>
        <input type="text" class="form-input" id="draftRecipient" placeholder="e.g. the team, John, leadership">
      </div>
      <div class="draft-output" id="draftOutput"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDraftModal()">Cancel</button>
        <button class="btn-copy" id="btnCopy" style="display:none" onclick="copyDraft()">Copy</button>
        <button class="btn-generate" id="btnGenerate" onclick="generateDraft()">Generate</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ── Task Detail / Create Modal ── -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal" style="width:460px">
      <div class="modal-title" id="taskModalTitle">Task</div>
      <div class="modal-sub" id="taskModalBlockTitle" style="margin-bottom:10px;font-size:14px;font-weight:500;color:#ccc"></div>

      <!-- New task title input (only shown when creating) -->
      <input type="text" class="form-input" id="newTaskTitleInput"
        placeholder="Task title…" style="display:none;margin-bottom:10px;width:100%">

      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:8px">Status</div>
      <div class="task-modal-status">
        <div class="status-chip" data-status="todo"     onclick="setTaskStatus('todo')">⬜ Todo</div>
        <div class="status-chip" data-status="in_progress" onclick="setTaskStatus('in_progress')">🔵 In Progress</div>
        <div class="status-chip" data-status="blocked"  onclick="setTaskStatus('blocked')">🔴 Blocked</div>
        <div class="status-chip" data-status="done"     onclick="setTaskStatus('done')">✅ Done</div>
      </div>

      <div class="modal-actions" style="justify-content:space-between">
        <button class="btn-cancel" id="btnDeleteTask" onclick="deleteTask()"
          style="color:#f87171;border-color:rgba(248,113,113,.3)">🗑 Delete</button>
        <div style="display:flex;gap:8px">
          <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
          <button class="btn-generate" id="btnSaveTask" onclick="saveTask()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentProjectId = null;
    let currentProjectData = null;

    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadProjects();
    });

    async function loadProjects() {
      const res = await fetch('/api/projects');
      const projects = await res.json();
      renderProjectList(projects);
      // Auto-select first active
      const first = projects.find(p => p.status === 'active') || projects[0];
      if (first) selectProject(first.id);
    }

    function renderProjectList(projects) {
      const el = document.getElementById('projectList');
      if (!projects.length) {
        el.innerHTML = `<div style="padding:20px;text-align:center;color:#555;font-size:13px;">No projects yet.</div>`;
        return;
      }
      el.innerHTML = projects.map(p => `
        <div class="project-item ${p.id === currentProjectId ? 'active' : ''}"
             id="proj-item-${p.id}" onclick="selectProject('${p.id}')">
          <div class="project-item-name">${p.title}</div>
          <div class="project-item-meta">
            <span class="project-item-pct">${p.progress}%</span>
            <span class="project-item-status status-${p.status}">${p.status}</span>
          </div>
          <div class="mini-progress">
            <div class="mini-progress-fill" style="width:${p.progress}%"></div>
          </div>
        </div>
      `).join('');
    }

    // ── Project Detail ────────────────────────────────────────────────────────
    async function selectProject(id) {
      currentProjectId = id;
      document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById(`proj-item-${id}`);
      if (item) item.classList.add('active');

      document.getElementById('detailPanel').innerHTML = `
        <div style="padding:40px;text-align:center;color:#555;">
          <div class="spinner" style="width:24px;height:24px;border-width:3px;margin:0 auto 12px"></div>
          <div style="font-size:13px;">Loading project…</div>
        </div>`;

      const [projRes, blocksRes, insightsRes] = await Promise.all([
        fetch(`/api/projects/${id}`),
        fetch(`/api/projects/${id}/leader-blocks`),
        fetch(`/api/projects/${id}/insights?status=pending`),
      ]);

      const proj = await projRes.json();
      const blocks = await blocksRes.json();
      const insights = await insightsRes.json();
      currentProjectData = { proj, blocks, insights };

      renderDetail(proj, blocks, insights);
    }

    function renderDetail(proj, data, insights) {
      const kpis = data.kpis || {};
      const lb = data.leader_blocks || {};
      const items = data.items || {};

      const deadlineClass = (kpis.days_left !== null && kpis.days_left !== undefined && kpis.days_left < 7)
        ? 'deadline' : 'ontrack';

      // Build progress ring
      const pct = kpis.progress_pct || 0;
      const r = 26, circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;

      document.getElementById('detailPanel').innerHTML = `
        <!-- Header -->
        <div class="project-header">
          <div class="project-title-row">
            <div>
              <div class="project-title">${proj.title}</div>
              ${proj.description ? `<div class="project-description" style="margin-top:5px">${proj.description}</div>` : ''}
              <div class="project-meta-row">
                <span class="meta-chip">${proj.status}</span>
                <span class="meta-chip">Priority ${proj.priority}</span>
                ${proj.target_date ? `<span class="meta-chip ${deadlineClass}">📅 ${kpis.deadline_label}</span>` : ''}
                ${proj.start_date ? `<span class="meta-chip">Started ${proj.start_date}</span>` : ''}
              </div>
            </div>
            <div class="header-actions">
              <button class="btn-action" onclick="refreshBlocks()" id="btnRefresh">🔄 Refresh</button>
              <button class="btn-auto-update" onclick="autoUpdateFromComms()" id="btnAutoUpdate">
                ⚡ Auto-Update from Emails &amp; Activities
              </button>
              <button class="btn-action primary" onclick="openDraftModal()">✍️ Draft Update</button>
            </div>
          </div>
        </div>

        <!-- 4 Leader Blocks -->
        <div class="leader-blocks-grid" id="leaderBlocksGrid">
          ${renderLeaderBlocks(lb, kpis, items, pct, r, circ, offset)}
        </div>

        <!-- AI Insights -->
        ${insights.length > 0 ? `
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">🤖 AI Detected <span class="section-badge">${insights.length} pending</span></div>
            <button class="btn-action" style="font-size:11px" onclick="loadInsights()">Refresh</button>
          </div>
          <div id="insightsList">${renderInsights(insights)}</div>
        </div>` : ''}

        <!-- Kanban Quick View -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">📋 Task Board</div>
            <button class="btn-action" style="font-size:11px" onclick="openNewTaskModal()">+ Add Task</button>
          </div>
          <div class="kanban-strip">
            ${renderKanbanCol('🔵 In Progress', items.in_progress || [], 'in_progress')}
            ${renderKanbanCol('⬜ Todo', items.todo || [], 'todo')}
            ${renderKanbanCol('🔴 Blocked', items.blocked || [], 'blocked')}
            ${renderKanbanCol('✅ Done', items.done || [], 'done')}
          </div>
        </div>

        <!-- Activity Feed -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">📝 Activity Log</div>
            <span style="font-size:11px;color:#555" id="actScanLabel"></span>
          </div>
          <div class="activity-feed" id="activityFeed">
            <div style="font-size:12px;color:#555;padding:6px">Loading activities…</div>
          </div>
          <div class="log-activity-form">
            <select class="log-type-select" id="actType">
              <option value="note">📝 Note</option>
              <option value="meeting">🤝 Meeting</option>
              <option value="call">📞 Call</option>
              <option value="update">🔄 Update</option>
              <option value="email">📧 Email</option>
            </select>
            <textarea class="log-input" id="actContent" rows="1"
              placeholder="Log an activity, decision, or communication related to this project…"
              oninput="autoResizeAct(this)"></textarea>
            <button class="btn-log" id="btnLogAct" onclick="logActivity()">Log</button>
          </div>
        </div>
      `;

      // Animate progress ring
      setTimeout(() => {
        const fill = document.getElementById('ringFill');
        if (fill) fill.style.strokeDashoffset = offset;
      }, 100);

      // Load activity feed for this project
      loadProjectActivities();
    }


    function renderLeaderBlocks(lb, kpis, items, pct, r, circ, offset) {
      const inProgressItems = (items.in_progress || []).slice(0,3);
      const blockedItems = (items.blocked || []).slice(0,3);
      const todoItems = (items.todo || []).slice(0,3);

      return `
        <!-- ① Progress -->
        <div class="leader-block lb-progress">
          <div class="lb-icon">🎯</div>
          <div class="lb-label">Progress</div>
          <div class="progress-ring-wrap">
            <svg width="64" height="64" class="progress-ring">
              <circle class="progress-ring-bg" cx="32" cy="32" r="${r}"/>
              <circle class="progress-ring-fill" id="ringFill" cx="32" cy="32" r="${r}"
                stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
            </svg>
            <div>
              <div class="lb-kpi">${pct}%</div>
              <div class="lb-kpi-sub">${kpis.tasks_done}/${kpis.tasks_total} done</div>
            </div>
          </div>
          <div class="lb-text">${lb.progress || '—'}</div>
        </div>

        <!-- ② Focus / Highlights -->
        <div class="leader-block lb-focus">
          <div class="lb-icon">🔥</div>
          <div class="lb-label">Focus</div>
          <div class="lb-text" style="margin-bottom:10px">${lb.focus || 'No recent activity highlights.'}</div>
          <div class="lb-items">
            ${inProgressItems.map(i => `<div class="lb-item-pill">${i.title}</div>`).join('') || '<div style="font-size:11px;color:#555">No active tasks</div>'}
          </div>
        </div>

        <!-- ③ Blockers -->
        <div class="leader-block lb-blockers">
          <div class="lb-icon">🚨</div>
          <div class="lb-label">Blockers</div>
          <div class="lb-kpi">${kpis.tasks_blocked}</div>
          <div class="lb-kpi-sub">blocked items</div>
          <div class="lb-text" style="margin-bottom:10px">${lb.blockers || 'No blockers.'}</div>
          <div class="lb-items">
            ${blockedItems.map(i => `<div class="lb-item-pill blocked">${i.title}</div>`).join('') || ''}
          </div>
        </div>

        <!-- ④ Need Support / Next Steps -->
        <div class="leader-block lb-support">
          <div class="lb-icon">🤝</div>
          <div class="lb-label">Need Support</div>
          <div class="lb-text" style="margin-bottom:10px">${lb.need_support || 'No pending next steps.'}</div>
          <div class="lb-items">
            ${todoItems.map(i => `<div class="lb-item-pill">${i.title}</div>`).join('') || '<div style="font-size:11px;color:#555">Queue is clear</div>'}
          </div>
        </div>
      `;
    }

    function renderKanbanCol(title, items, colStatus) {
      const taskClass = colStatus === 'blocked' ? 'blocked-task' : colStatus === 'done' ? 'done-task' : '';
      return `
        <div class="kanban-col">
          <div class="kanban-col-title">
            ${title}
            <span class="kanban-count">${items.length}</span>
          </div>
          ${items.length === 0
            ? `<div style="font-size:11px;color:#444;padding:4px">—</div>`
            : items.map(i => `<div class="kanban-task ${taskClass}"
                onclick="openTaskModal('${i.id}', ${JSON.stringify(i.title).replace(/'/g,"\\'")}, '${colStatus}')"
                title="Click to edit task">${i.title}</div>`).join('')
          }
        </div>`;
    }

    function renderInsights(insights) {
      return insights.map(ins => `
        <div class="insight-item" id="insight-${ins.id}">
          <span class="insight-type-badge type-${ins.insight_type}">${ins.insight_type.replace('_',' ')}</span>
          <div class="insight-body">
            <div class="insight-title">${ins.title}</div>
            <div class="insight-meta">
              From: ${ins.source_type} · ${Math.round(ins.confidence * 100)}% confidence
              ${ins.suggested_due_date ? ` · Due ${ins.suggested_due_date}` : ''}
            </div>
          </div>
          <div class="insight-actions">
            <button class="btn-insight btn-accept" onclick="acceptInsight('${ins.id}')">✓ Accept</button>
            <button class="btn-insight btn-reject" onclick="rejectInsight('${ins.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    async function refreshBlocks() {
      if (!currentProjectId) return;
      const btn = document.getElementById('btnRefresh');
      btn.innerHTML = '<span class="spinner"></span> Refreshing…';
      btn.disabled = true;

      const res = await fetch(`/api/projects/${currentProjectId}/leader-blocks/refresh`, { method: 'POST' });
      const data = await res.json();

      // Update the leader blocks in place
      const grid = document.getElementById('leaderBlocksGrid');
      const kpis = data.kpis || {};
      const lb = data.leader_blocks || {};
      const items = currentProjectData?.blocks?.items || {};
      const pct = kpis.progress_pct || 0;
      const r = 26, circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      grid.innerHTML = renderLeaderBlocks(lb, kpis, items, pct, r, circ, offset);
      setTimeout(() => {
        const fill = document.getElementById('ringFill');
        if (fill) fill.style.strokeDashoffset = offset;
      }, 50);

      btn.innerHTML = '🔄 Refresh Blocks';
      btn.disabled = false;
      showToast('✅ Leader blocks updated', 'success');
    }

    async function acceptInsight(insightId) {
      const el = document.getElementById(`insight-${insightId}`);
      el.style.opacity = '.4';
      const res = await fetch(`/api/projects/${currentProjectId}/insights/${insightId}/accept`, { method: 'POST' });
      const data = await res.json();
      el.remove();
      showToast(`✅ Task created: ${data.task_title}`, 'success');
      // Refresh blocks to update progress
      setTimeout(refreshBlocks, 500);
    }

    async function rejectInsight(insightId) {
      const el = document.getElementById(`insight-${insightId}`);
      el.style.opacity = '.4';
      await fetch(`/api/projects/${currentProjectId}/insights/${insightId}/reject`, { method: 'POST' });
      el.remove();
      showToast('Insight dismissed', '');
    }

    async function loadInsights() {
      if (!currentProjectId) return;
      const res = await fetch(`/api/projects/${currentProjectId}/insights?status=pending`);
      const insights = await res.json();
      const list = document.getElementById('insightsList');
      if (list) list.innerHTML = renderInsights(insights);
    }

    // ── Task Modal ─────────────────────────────────────────────────────────────
    let _taskModalBlockId = null;
    let _taskModalCurrentStatus = null;

    function openTaskModal(blockId, title, currentStatus) {
      _taskModalBlockId = blockId;
      _taskModalCurrentStatus = currentStatus;
      document.getElementById('taskModalTitle').textContent = 'Edit Task';
      document.getElementById('taskModalBlockTitle').textContent = title;
      document.getElementById('newTaskTitleInput').style.display = 'none';
      document.getElementById('btnDeleteTask').style.display = 'inline-block';
      document.querySelectorAll('.status-chip').forEach(chip => {
        chip.classList.toggle('active-status', chip.dataset.status === currentStatus);
      });
      document.getElementById('taskModal').classList.add('open');
    }


    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('open');
    }

    function setTaskStatus(status) {
      _taskModalCurrentStatus = status;
      document.querySelectorAll('.status-chip').forEach(chip => {
        chip.classList.toggle('active-status', chip.dataset.status === status);
      });
    }

    async function saveTaskStatus() {
      if (!_taskModalBlockId) return;
      const btn = document.getElementById('btnSaveTask');
      btn.textContent = 'Saving…'; btn.disabled = true;

      await fetch(`/api/projects/${currentProjectId}/blocks/${_taskModalBlockId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: _taskModalCurrentStatus }),
      });

      closeTaskModal();
      showToast('✅ Task updated', 'success');
      // Reload project to reflect new status in kanban & leader blocks
      await selectProject(currentProjectId);
      // Trigger background block refresh
      setTimeout(() => refreshBlocks(), 600);
    }

    async function deleteTask() {
      if (!_taskModalBlockId || !confirm('Delete this task?')) return;
      await fetch(`/api/projects/${currentProjectId}/blocks/${_taskModalBlockId}`, { method: 'DELETE' });
      closeTaskModal();
      showToast('Task deleted', '');
      selectProject(currentProjectId);
    }

    function openNewTaskModal() {
      _taskModalBlockId = null;
      _taskModalCurrentStatus = 'todo';
      document.getElementById('taskModalTitle').textContent = 'New Task';
      document.getElementById('taskModalBlockTitle').textContent = '';
      document.querySelectorAll('.status-chip').forEach(chip => {
        chip.classList.toggle('active-status', chip.dataset.status === 'todo');
      });
      document.getElementById('newTaskTitleInput').style.display = 'block';
      document.getElementById('newTaskTitleInput').value = '';
      document.getElementById('btnDeleteTask').style.display = 'none';
      document.getElementById('taskModal').classList.add('open');
    }

    async function saveTask() {
      // If creating new
      if (!_taskModalBlockId) {
        const title = document.getElementById('newTaskTitleInput').value.trim();
        if (!title) return;
        const btn = document.getElementById('btnSaveTask');
        btn.textContent = 'Saving…'; btn.disabled = true;
        await fetch(`/api/projects/${currentProjectId}/blocks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, block_type: 'task', status: _taskModalCurrentStatus }),
        });
        closeTaskModal();
        showToast('✅ Task added', 'success');
        selectProject(currentProjectId);
      } else {
        await saveTaskStatus();
      }
    }

    // ── Activity Feed ──────────────────────────────────────────────────────────
    async function loadProjectActivities() {
      if (!currentProjectId) return;
      const res = await fetch(`/api/projects/${currentProjectId}/activities?limit=15`);
      const acts = await res.json();
      const feed = document.getElementById('activityFeed');
      if (!feed) return;
      if (!acts.length) {
        feed.innerHTML = `<div style="font-size:12px;color:#555;padding:6px">No activities logged yet. Add a note below.</div>`;
        return;
      }
      const dotMap = { note:'dot-note', meeting:'dot-meeting', email:'dot-email', call:'dot-call', update:'dot-update' };
      feed.innerHTML = acts.map(a => {
        const dot = dotMap[a.type] || 'dot-note';
        const time = a.occurred_at ? new Date(a.occurred_at).toLocaleDateString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
        return `<div class="activity-item">
          <div class="activity-dot ${dot}"></div>
          <div class="activity-text">${a.content}</div>
          <div class="activity-time">${time}</div>
        </div>`;
      }).join('');
    }

    async function logActivity() {
      const content = document.getElementById('actContent').value.trim();
      if (!content || !currentProjectId) return;
      const btn = document.getElementById('btnLogAct');
      btn.textContent = 'Logging…'; btn.disabled = true;

      const res = await fetch(`/api/projects/${currentProjectId}/activities`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content,
          type: document.getElementById('actType').value,
        }),
      });

      document.getElementById('actContent').value = '';
      document.getElementById('actContent').style.height = 'auto';
      btn.textContent = 'Log'; btn.disabled = false;

      if (res.ok) {
        showToast('✅ Activity logged — AI is analysing…', 'success');
        loadProjectActivities();
        // Blocks will refresh in background; also trigger a refresh after 3s
        setTimeout(() => refreshBlocks(), 3000);
      } else {
        showToast('Failed to log activity', 'error');
      }
    }

    function autoResizeAct(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    // ── Auto-Update from Emails & Activities ───────────────────────────────────
    async function autoUpdateFromComms() {
      if (!currentProjectId) return;
      const btn = document.getElementById('btnAutoUpdate');
      btn.innerHTML = '<span class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff"></span> Scanning…';
      btn.disabled = true;

      try {
        const res = await fetch(`/api/projects/${currentProjectId}/auto-update`, { method: 'POST' });
        const data = await res.json();

        // Update leader blocks in place
        const grid = document.getElementById('leaderBlocksGrid');
        const kpis = data.kpis || {};
        const lb = data.leader_blocks || {};
        const items = currentProjectData?.blocks?.items || {};
        const pct = kpis.progress_pct || 0;
        const r = 26, circ = 2 * Math.PI * r;
        const offset = circ - (pct / 100) * circ;
        if (grid) grid.innerHTML = renderLeaderBlocks(lb, kpis, items, pct, r, circ, offset);
        setTimeout(() => {
          const fill = document.getElementById('ringFill');
          if (fill) fill.style.strokeDashoffset = offset;
        }, 50);

        loadProjectActivities();
        loadInsights();
        showToast(`⚡ Scanned ${data.items_scanned} items, found ${data.insights_extracted} insights`, 'success');
      } catch (err) {
        showToast('Auto-update failed', 'error');
      } finally {
        btn.innerHTML = '⚡ Auto-Update from Emails &amp; Activities';
        btn.disabled = false;
      }
    }

    // ── Draft Update Modal ────────────────────────────────────────────────────
    function openDraftModal() {
      if (!currentProjectId) return;
      const proj = currentProjectData?.proj;
      document.getElementById('draftModalSub').textContent =
        `Generate a status update for: ${proj?.title || 'this project'}`;
      document.getElementById('draftOutput').classList.remove('visible');
      document.getElementById('draftOutput').textContent = '';
      document.getElementById('btnCopy').style.display = 'none';
      document.getElementById('draftModal').classList.add('open');
    }

    function closeDraftModal() {
      document.getElementById('draftModal').classList.remove('open');
    }

    async function generateDraft() {
      const btn = document.getElementById('btnGenerate');
      btn.innerHTML = '<span class="spinner"></span> Generating…';
      btn.disabled = true;

      const res = await fetch(`/api/projects/${currentProjectId}/draft-update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          format: document.getElementById('draftFormat').value,
          tone: document.getElementById('draftTone').value,
          recipient: document.getElementById('draftRecipient').value || 'the team',
        }),
      });
      const data = await res.json();

      const output = document.getElementById('draftOutput');
      output.textContent = data.draft || 'No draft generated.';
      output.classList.add('visible');
      document.getElementById('btnCopy').style.display = 'inline-block';
      btn.innerHTML = 'Regenerate';
      btn.disabled = false;
    }

    function copyDraft() {
      const text = document.getElementById('draftOutput').textContent;
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard', 'success'));
    }

    // Close modal on overlay click
    document.getElementById('draftModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('draftModal')) closeDraftModal();
    });

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── New Project Modal (simple prompt) ────────────────────────────────────
    function openNewProjectModal() {
      const title = prompt('Project name:');
      if (!title) return;
      const desc = prompt('Short description (optional):') || '';
      const target = prompt('Target date YYYY-MM-DD (optional):') || null;
      fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc, target_date: target }),
      }).then(r => r.json()).then(p => {
        loadProjects();
        setTimeout(() => selectProject(p.id), 400);
        showToast(`✅ Project "${title}" created`, 'success');
      });
    }
  </script>
</body>
</html>
