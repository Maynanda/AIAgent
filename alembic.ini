# A generic, single-database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, where env.py should look for source files
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# timezone =

# version location specification; this defaults
# to database/migrations/versions. When using multiple version
# directories, paths must be separated by spaces.
# version_locations = %(here)s/bar

# version path separator; defaults to "os.pathsep".
# Use a space to allow newline character formatting
# version_path_separator = :

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
